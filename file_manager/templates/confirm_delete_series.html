<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_name }} - Confirm Delete User</title>
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <meta name="theme-color" content="#121212">
</head>
<body>
    <div class="profile-container">
        <h1>Confirm Deletion</h1>
        <p>Are you sure you want to delete <strong>{{ series_name }}</strong>? This action cannot be undone.</p>
        <form method="POST" action="{{ url_for('file_manager.confirm_remove_series_to_download_list') }}" style="display: inline-block;">
            <input type="hidden" name="series_name" value="{{ series_name }}">
            <input type="hidden" name="read_online_link" value="{{ read_online_link }}">
            <input type="hidden" name="files_or_list" value="False">
            <button type="submit" class="manage-actions delete-btn">
                <i class="fas fa-trash"></i> Delete from list
            </button>
        </form>
        <form method="POST" action="{{ url_for('file_manager.confirm_remove_series_to_download_list') }}" style="display: inline-block;">
            <input type="hidden" name="series_name" value="{{ series_name }}">
            <input type="hidden" name="read_online_link" value="{{ read_online_link }}">
            <button type="submit" class="manage-actions delete-btn">
                <input type="hidden" name="files_or_list" value="True">
                <i class="fas fa-trash"></i> Delete files and list
            </button>
        </form>
        <a href="{{ url_for('file_manager.file_manager') }}" class="btn cancel-btn"><i class="fas fa-times"></i> Cancel</a>
    </div>
</body>
</html>
