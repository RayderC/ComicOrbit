<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="apple-touch-icon" sizes="1024x1024" href="{{ url_for('static', filename='favicon.png') }}">
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <meta name="theme-color" content="#121212">
</head>
<body>
    <!-- Settings Icon with Dropdown -->
    <button class="dropdown-menu-trigger" onclick="window.location.href='{{ url_for('profile.profile') }}'">
        <i class="fas fa-cog"></i>
    </button>

    <div class="main-container">
        <div class="title-upload">
            <h1>
                <img src="{{ url_for('static', filename='favicon.png') }}" alt="ComicOrbit Icon" class="title-icon">
                {{ site_name }}
            </h1>
            <div class="menu-container"></div>
        </div>

        <!-- Continue reading Added Section -->
        <div class="continue-reading">
            <h2>Continue Reading</h2>
            <div class="series-container">
                {% for series in series_data %}
                <div class="series-card">
                    <a href="{{ url_for('main.series', folder_type=series.type, series=series.name) }}">
                        <img src="{{ series.cover_art }}" alt="{{ series.name }}" class="cover-img">
                        <h3>{{ series.name }}</h3>
                        <p class="series-type">{{ series.type | capitalize }}</p>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>

        <!-- Recently Added Section -->
        <div class="recently-added">
            <h2>Recently Added</h2>
            <div class="series-container">
                {% for series in recently_added %}
                <div class="series-card">
                    <a href="{{ url_for('main.series', folder_type=series.type, series=series.name) }}">
                        <img src="{{ series.cover_art }}" alt="{{ series.name }}" class="cover-img">
                        <h3>{{ series.name }}</h3>
                        <p class="series-type">{{ series.type | capitalize }}</p>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker
        .register('{{ url_for('static', filename='js/service-worker.js') }}')
        .then((registration) => {
          console.log('Service Worker registered with scope: ', registration.scope);
        })
        .catch((error) => {
          console.log('Service Worker registration failed: ', error);
        });
    });
  }
</script>
</html>
